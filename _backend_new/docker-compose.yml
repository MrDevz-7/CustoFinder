# Docker Compose para el entorno de DESARROLLO LOCAL.
#
# Qué es Docker Compose: una herramienta que levanta uno o más
# "contenedores" (mini-máquinas aisladas con su propio software instalado)
# a partir de un archivo de configuración declarativo. Acá lo usamos para
# levantar Postgres sin tener que instalarlo directamente en tu máquina:
# todo queda encapsulado, y "apagar Postgres" es simplemente `docker
# compose down`.
#
# Por qué Postgres en Docker y NO SQLite: el proyecto final corre en
# Postgres (Railway, Día 7). Si desarrollamos con SQLite ahora, en algún
# momento futuro tendríamos que migrar tipos de datos, constraints y
# comportamiento (SQLite es mucho más laxo con tipos) — mejor evitarlo
# desde el día 1 usando el mismo motor en todos lados.
services:
  postgres:
    image: postgres:16
    container_name: custofinder_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: custofinder
      POSTGRES_PASSWORD: custofinder
      POSTGRES_DB: custofinder
    ports:
      - "5432:5432"
    volumes:
      # Persiste los datos de Postgres en un volumen nombrado, para que
      # no se pierdan cada vez que apagas/prendes el contenedor.
      - custofinder_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U custofinder -d custofinder"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  custofinder_pgdata:
